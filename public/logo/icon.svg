<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="#0B1F3A"/>

  <!-- Connecting lines -->
  <line x1="100" y1="74" x2="50"  y2="130" stroke="#06B6D4" stroke-width="4.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="100" y1="74" x2="150" y2="130" stroke="#06B6D4" stroke-width="4.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="50"  y1="145" x2="150" y2="145" stroke="#06B6D4" stroke-width="3.5" stroke-opacity="0.30" stroke-linecap="round"/>

  <!-- Top node -->
  <circle cx="100" cy="56" r="18" fill="white"/>
  <circle cx="94"  cy="50" r="5"  fill="white" fill-opacity="0.25"/>

  <!-- Bottom nodes -->
  <circle cx="50"  cy="145" r="15" fill="white" fill-opacity="0.80"/>
  <circle cx="150" cy="145" r="15" fill="white" fill-opacity="0.80"/>
</svg>
