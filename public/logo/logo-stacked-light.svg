<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" fill="none">
  <!-- Dark navy background for the whole card -->
  <rect width="240" height="260" rx="16" fill="#0B1F3A"/>

  <!-- Icon mark centered -->
  <rect x="50" y="20" width="140" height="140" rx="28" fill="#06B6D4" fill-opacity="0.15"/>
  <line x1="120" y1="72"  x2="85"  y2="113" stroke="#06B6D4" stroke-width="3"   stroke-opacity="0.5"  stroke-linecap="round"/>
  <line x1="120" y1="72"  x2="155" y2="113" stroke="#06B6D4" stroke-width="3"   stroke-opacity="0.5"  stroke-linecap="round"/>
  <line x1="85"  y1="123" x2="155" y2="123" stroke="#06B6D4" stroke-width="2.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <circle cx="120" cy="60"  r="13" fill="white"/>
  <circle cx="85"  cy="123" r="11" fill="white" fill-opacity="0.8"/>
  <circle cx="155" cy="123" r="11" fill="white" fill-opacity="0.8"/>

  <!-- Wordmark centered -->
  <text x="120" y="196"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="700" font-size="22" fill="white" letter-spacing="-0.3"
    text-anchor="middle">BT Engine Lab</text>

  <!-- Cyan accent line -->
  <rect x="92" y="202" width="55" height="2.5" rx="1.25" fill="#06B6D4"/>

  <!-- Tagline -->
  <text x="120" y="230"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="9" fill="rgba(255,255,255,0.45)" letter-spacing="1.8"
    text-anchor="middle">LIFE SCIENCE EQUIPMENT</text>
</svg>
