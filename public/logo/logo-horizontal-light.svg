<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" fill="none">
  <!-- Icon mark (cyan on dark) -->
  <rect width="120" height="120" rx="24" fill="#06B6D4"/>
  <line x1="60"  y1="44"  x2="30"  y2="79"  stroke="#0B1F3A" stroke-width="2.5" stroke-opacity="0.4"  stroke-linecap="round"/>
  <line x1="60"  y1="44"  x2="90"  y2="79"  stroke="#0B1F3A" stroke-width="2.5" stroke-opacity="0.4"  stroke-linecap="round"/>
  <line x1="30"  y1="87"  x2="90"  y2="87"  stroke="#0B1F3A" stroke-width="2"   stroke-opacity="0.25" stroke-linecap="round"/>
  <circle cx="60" cy="34" r="11" fill="white"/>
  <circle cx="30" cy="87" r="9"  fill="white" fill-opacity="0.85"/>
  <circle cx="90" cy="87" r="9"  fill="white" fill-opacity="0.85"/>

  <!-- Wordmark (white for dark backgrounds) -->
  <text x="144" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="700" font-size="30" fill="white" letter-spacing="-0.3">BT Engine Lab</text>

  <!-- Cyan underline accent -->
  <rect x="144" y="56" width="55" height="2.5" rx="1.25" fill="#06B6D4"/>

  <!-- Tagline -->
  <text x="145" y="80"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11.5" fill="rgba(255,255,255,0.55)" letter-spacing="2.2">LIFE SCIENCE &amp; PROTEOMICS EQUIPMENT</text>
</svg>
